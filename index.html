<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Do You Love Me?</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins', Arial, sans-serif;
}

html, body{
    height:100%;
    width:100%;
}

body{
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:linear-gradient(135deg,#ff9a9e,#fecfef);
    overflow-x:hidden;
    position:relative;
}

.screen{
    display:none;
    text-align:center;
    width:100%;
}

.screen.active{
    display:block;
}

/* ---- floating hearts background ---- */
.heart{
    position:fixed;
    top:100%;
    font-size:22px;
    opacity:0.8;
    pointer-events:none;
    animation:floatUp linear infinite;
    z-index:0;
}

@keyframes floatUp{
    0%{ transform:translateY(0) rotate(0deg); opacity:0; }
    10%{ opacity:1; }
    100%{ transform:translateY(-110vh) rotate(360deg); opacity:0; }
}

/* ---- Screen 1: Question ---- */
h1{
    font-size:28px;
    margin-bottom:40px;
    position:relative;
    z-index:1;
    animation:bounceIn 1s ease;
}

@keyframes bounceIn{
    0%{ transform:scale(0.3); opacity:0; }
    60%{ transform:scale(1.1); opacity:1; }
    100%{ transform:scale(1); }
}

button{
    padding:12px 25px;
    font-size:18px;
    border:none;
    border-radius:25px;
    cursor:pointer;
    margin:10px;
    position:relative;
    z-index:1;
    transition:transform 0.2s ease;
}

button:hover{
    transform:scale(1.08);
}

.yes{
    background:#ff4d6d;
    color:white;
    animation:pulse 1.4s infinite;
    box-shadow:0 5px 15px rgba(255,77,109,0.5);
}

@keyframes pulse{
    0%{ box-shadow:0 0 0 0 rgba(255,77,109,0.6); }
    70%{ box-shadow:0 0 0 18px rgba(255,77,109,0); }
    100%{ box-shadow:0 0 0 0 rgba(255,77,109,0); }
}

.no{
    background:#555;
    color:white;
    position:absolute;
}

/* ---- Screen 2: Reveal ---- */
#screen2{
    background:linear-gradient(135deg,#fbc2eb,#fcd6e8);
    min-height:100vh;
    padding:50px 20px;
}

.reveal-title{
    font-size:34px;
    font-weight:700;
    color:#d6336c;
    margin-bottom:10px;
    animation:fadeUp 1s ease-in-out;
    position:relative;
    z-index:1;
}

.reveal-sub{
    font-size:16px;
    color:#7a3b53;
    margin-bottom:40px;
    animation:fadeUp 1.3s ease-in-out;
    position:relative;
    z-index:1;
}

@keyframes fadeUp{
    0%{ transform:translateY(20px); opacity:0; }
    100%{ transform:translateY(0); opacity:1; }
}

/* gallery */
.gallery{
    display:grid;
    grid-template-columns:repeat(auto-fit, minmax(220px, 1fr));
    gap:25px;
    max-width:1000px;
    margin:0 auto;
    position:relative;
    z-index:1;
}

.photo-card{
    background:white;
    padding:12px;
    border-radius:20px;
    box-shadow:0 15px 30px rgba(0,0,0,0.2);
    opacity:0;
    animation:popIn 0.8s ease forwards;
}

.photo-card:nth-child(odd){ --tilt:-3deg; }
.photo-card:nth-child(even){ --tilt:3deg; }

.photo-card:nth-child(1){ animation-delay:0.1s; }
.photo-card:nth-child(2){ animation-delay:0.3s; }
.photo-card:nth-child(3){ animation-delay:0.5s; }
.photo-card:nth-child(4){ animation-delay:0.7s; }
.photo-card:nth-child(5){ animation-delay:0.9s; }
.photo-card:nth-child(6){ animation-delay:1.1s; }

@keyframes popIn{
    0%{ opacity:0; transform:translateY(40px) scale(0.8) rotate(0deg); }
    60%{ opacity:1; transform:translateY(-6px) scale(1.03) rotate(0deg); }
    100%{ opacity:1; transform:translateY(0) scale(1) rotate(var(--tilt,0deg)); }
}

.photo-card img{
    width:100%;
    height:260px;
    object-fit:cover;
    border-radius:14px;
    display:block;
    transition:transform 0.4s ease;
}

.photo-card:hover img{
    transform:scale(1.08);
}

.photo-card:hover{
    transform:translateY(-8px) scale(1.02) rotate(0deg) !important;
    transition:transform 0.3s ease;
}

.final-text{
    margin-top:50px;
    font-size:30px;
    font-weight:700;
    color:#d6336c;
    position:relative;
    z-index:1;
    opacity:0;
    animation:fadeUp 1s ease forwards;
    animation-delay:1.4s;
}

.final-text span{
    display:inline-block;
    animation:wiggle 1.6s ease-in-out infinite;
    animation-delay:2.2s;
}

@keyframes wiggle{
    0%,100%{ transform:rotate(0deg); }
    25%{ transform:rotate(-8deg); }
    75%{ transform:rotate(8deg); }
}
</style>
</head>

<body>

<!-- Screen 1: Question -->
<div class="screen active" id="screen1">
    <h1>Will You Marry Me ? ❤️</h1>
    <button class="yes" onclick="goToNext()">Yes 💖</button>
    <button class="no" id="noBtn">No 😢</button>
</div>

<!-- Screen 2: Reveal -->
<div class="screen" id="screen2">
    <div class="reveal-title">I knew it 😍!</div>
    <div class="reveal-sub">every little moment with you ✨</div>

    <div class="gallery">
        <div class="photo-card"><img src="shy_img1.jpeg" alt="memory 1"></div>
        <div class="photo-card"><img src="shy_img2.jpeg" alt="memory 2"></div>
        <div class="photo-card"><img src="shy_img4.jpeg" alt="memory 4"></div>
        <div class="photo-card"><img src="shy_img5.jpeg" alt="memory 5"></div>
        <div class="photo-card"><img src="shy_img6.jpeg" alt="memory 6"></div>
    </div>

    <div class="final-text">Forever & Always <span>❤️</span></div>
</div>

<script>
const noBtn = document.getElementById("noBtn");

noBtn.addEventListener("mouseover", moveButton);
noBtn.addEventListener("click", moveButton);

function moveButton(){
    const x = Math.random() * (window.innerWidth - 100);
    const y = Math.random() * (window.innerHeight - 50);

    noBtn.style.left = x + "px";
    noBtn.style.top = y + "px";
}

function goToNext(){
    document.getElementById("screen1").classList.remove("active");
    document.getElementById("screen2").classList.add("active");
    document.body.style.background = "linear-gradient(135deg,#fbc2eb,#fcd6e8)";
    document.body.style.alignItems = "flex-start";
    window.scrollTo(0,0);
}

// floating hearts background
function spawnHeart(){
    const heart = document.createElement("div");
    heart.classList.add("heart");
    heart.innerHTML = ["❤️","💕","💖","💗","💞"][Math.floor(Math.random()*5)];
    heart.style.left = Math.random() * 100 + "vw";
    heart.style.fontSize = (14 + Math.random()*22) + "px";
    const duration = 6 + Math.random() * 6;
    heart.style.animationDuration = duration + "s";
    document.body.appendChild(heart);
    setTimeout(() => heart.remove(), duration * 1000);
}

setInterval(spawnHeart, 500);
</script>

</body>
</html>
